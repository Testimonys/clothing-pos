server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/clothing_pos?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: admin123
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

app:
  jwt:
    secret: huaxing-clothing-pos-jwt-secret-key-2026
    expiration-ms: 86400000
  store:
    name: 华兴服装店
  backup:
    path: ./backup
    keep-days: 7
  printer:
    enabled: true
    port: /dev/cu.usbprinter
  upload:
    path: ./uploads

services:
  mysql:
    image: mysql:8.0
    container_name: clothing-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin123
      MYSQL_DATABASE: clothing_pos
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - clothing-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clothing-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/clothing_pos?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin123
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - backup:/app/backup
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/api/auth/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - clothing-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clothing-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - clothing-net

volumes:
  mysql-data:
  uploads:
  backup:

networks:
  clothing-net:
    driver: bridge
